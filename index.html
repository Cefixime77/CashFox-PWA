<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦊</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#A8D8EA" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CashFox" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>CashFox - 小狐狸记账</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- ⚡ 内联加载屏：React 加载前立即显示，防止白屏 -->
    <style>
      #app-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #F5F9FC;
        z-index: 99999;
        transition: opacity 0.3s ease-out;
      }
      #app-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #app-loader .fox {
        font-size: 64px;
        animation: fox-bounce 1.5s ease-in-out infinite;
      }
      #app-loader .text {
        margin-top: 16px;
        font-family: 'Nunito', system-ui, -apple-system, sans-serif;
        font-size: 16px;
        font-weight: 600;
        color: #7EC8E3;
      }
      #app-loader .dots::after {
        content: '';
        animation: dots 1.5s steps(4, end) infinite;
      }
      @keyframes fox-bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }
      @keyframes dots {
        0% { content: ''; }
        25% { content: '.'; }
        50% { content: '..'; }
        75% { content: '...'; }
      }
    </style>
  </head>
  <body>
    <!-- ⚡ 即时加载屏：不等 JS，HTML 解析完就显示 -->
    <div id="app-loader">
      <div class="fox">🦊</div>
      <div class="text">小财正在准备<span class="dots"></span></div>
    </div>

    <div id="root"></div>

    <!-- 加载屏移除脚本：React 挂载后自动隐藏 -->
    <script>
      // 10 秒超时自动隐藏，避免永久卡住
      setTimeout(function() {
        var loader = document.getElementById('app-loader');
        if (loader) loader.classList.add('hidden');
      }, 10000);
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
