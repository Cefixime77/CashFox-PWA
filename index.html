<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦊</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#A8D8EA" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CashFox" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>CashFox - 小狐狸记账</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <style>
      /* ═══════════════════════════════════════
         内联加载屏 — 零 JS 立即显示
         React 完全就绪后由 window.__cashfoxReady() 关闭
         ═══════════════════════════════════════ */
      #app-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #F5F9FC;
        z-index: 99999;
        transition: opacity 0.5s ease-out;
        font-family: 'Nunito', system-ui, -apple-system, sans-serif;
      }
      #app-loader.done {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.5s ease-out, visibility 0s 0.5s;
        visibility: hidden;
      }

      /* 🦊 狐狸 */
      #app-loader .fox {
        font-size: 64px;
        animation: fox-bounce 1.5s ease-in-out infinite;
      }

      /* 🔵 环形进度条 — 纯 CSS */
      #app-loader .spinner {
        width: 44px;
        height: 44px;
        margin-top: 24px;
        border: 4px solid #E8F4F8;
        border-top-color: #7EC8E3;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      #app-loader .load-text {
        margin-top: 14px;
        font-size: 15px;
        font-weight: 600;
        color: #7EC8E3;
      }

      @keyframes fox-bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <!-- ⚡ 即时加载屏 -->
    <div id="app-loader">
      <div class="fox">🦊</div>
      <div class="spinner"></div>
      <div class="load-text">小财正在准备...</div>
    </div>

    <div id="root"></div>

    <script>
      // 20 秒兜底超时 — 万一 JS 彻底挂了也能看到内容
      setTimeout(function() {
        var loader = document.getElementById('app-loader');
        if (loader && !loader.classList.contains('done')) {
          loader.classList.add('done');
        }
      }, 20000);

      // React 就绪后调用此函数关闭加载屏
      window.__cashfoxReady = function() {
        var loader = document.getElementById('app-loader');
        if (loader) loader.classList.add('done');
      };
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
